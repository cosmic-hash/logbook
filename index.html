<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Logbook</title>
<style>
  :root{
    --paper: #F6F1E7;
    --paper-line: #E7DFCC;
    --ink: #262220;
    --ink-soft: #6B6459;
    --margin-red: #C2564B;
    --teal: #2F6E68;
    --amber: #B9822E;
    --red: #B5533C;
    --card: #FFFDF7;
    --card-border: #E4DCC8;
    --note-events: #FFF3A3;
    --note-work: #B8D4F0;
    --note-personal: #C8E6C9;
    --note-school: #E1BEE7;
    --note-inbox: #F5F0E6;
    --note-done: #E8E4DC;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  html{overflow-x:hidden;}
  body{
    background:
      repeating-linear-gradient(to bottom, transparent 0px, transparent 34px, var(--paper-line) 35px),
      var(--paper);
    color:var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    -webkit-text-size-adjust:100%;
  }
  .page{ width:100%; position:relative; padding:28px 20px 150px 48px; min-height:100vh; display:none; }
  .margin-rule{ position:absolute; top:0; bottom:0; left:32px; width:2px; background:var(--margin-red); opacity:0.55; }
  header{ display:flex; justify-content:space-between; align-items:baseline; flex-wrap:wrap; gap:8px; max-width:100%; }
  header h1{ font-family: Georgia, "Times New Roman", serif; font-size:28px; margin:0 0 4px 0; }
  header p{ margin:0; color:var(--ink-soft); font-size:14px; }
  .signout{ background:none; border:none; color:var(--ink-soft); font-size:12px; cursor:pointer; text-decoration:underline; }
  .header-actions{ display:flex; gap:12px; align-items:center; }
  .mcp-token-btn{ background:none; border:1px solid var(--card-border); color:var(--ink-soft); font-size:12px; cursor:pointer; padding:4px 8px; border-radius:4px; }
  .mcp-token-panel{ display:none; margin-top:8px; padding:10px; background:var(--card); border:1px solid var(--card-border); border-radius:6px; font-size:12px; max-width:520px; }
  .mcp-token-panel code{ display:block; word-break:break-all; margin:6px 0; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size:11px; }
  .section-label{ font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--ink-soft); margin:24px 0 10px 0; }
  .empty{ color:var(--ink-soft); font-size:14px; font-style:italic; padding:8px 0; }

  /* Horizontal sticky-note board */
  .board-wrap{ margin:0 -8px; }
  .board-scroll{
    display:flex; gap:14px; overflow-x:auto; overflow-y:visible;
    padding:8px 8px 20px 8px; scroll-snap-type:x mandatory;
    scroll-padding-inline:8px; overscroll-behavior-x:contain;
    -webkit-overflow-scrolling:touch; touch-action:pan-x;
    scrollbar-width:thin; scrollbar-color:var(--card-border) transparent;
  }
  .board-scroll::-webkit-scrollbar{ height:8px; }
  .board-scroll::-webkit-scrollbar-thumb{ background:var(--card-border); border-radius:4px; }
  .board-column{
    flex:0 0 min(280px, 78vw); scroll-snap-align:start;
    display:flex; flex-direction:column; min-height:120px;
  }
  .column-header{
    font-family: Georgia, "Times New Roman", serif; font-size:16px;
    margin:0 0 10px 4px; display:flex; align-items:center; gap:8px;
    position:sticky; left:0;
  }
  .column-count{
    font-family: ui-monospace, monospace; font-size:10px; color:var(--ink-soft);
    background:rgba(255,255,255,0.6); border-radius:10px; padding:1px 7px;
  }
  .column-notes{ display:flex; flex-direction:column; gap:10px; flex:1; }
  .column-empty{
    font-size:12px; color:var(--ink-soft); font-style:italic; opacity:0.7;
    padding:12px 8px; text-align:center;
  }

  .sticky-note{
    position:relative; padding:12px 14px 14px 14px; border-radius:2px;
    cursor:pointer; transition:transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 2px 3px 8px rgba(38,34,32,0.12), 0 1px 2px rgba(38,34,32,0.08);
    border:1px solid rgba(38,34,32,0.06);
    transform:rotate(var(--rot, 0deg));
  }
  .sticky-note:hover{
    transform:rotate(0deg) translateY(-2px) scale(1.02);
    box-shadow: 3px 6px 14px rgba(38,34,32,0.18);
    z-index:2;
  }
  .sticky-note.done{ opacity:0.6; filter:saturate(0.7); }
  .sticky-note.cat-events{ background:var(--note-events); --rot:-1.2deg; }
  .sticky-note.cat-work{ background:var(--note-work); --rot:0.8deg; }
  .sticky-note.cat-personal{ background:var(--note-personal); --rot:-0.6deg; }
  .sticky-note.cat-school{ background:var(--note-school); --rot:1deg; }
  .sticky-note.cat-inbox{ background:var(--note-inbox); --rot:-0.4deg; }
  .sticky-note.cat-done{ background:var(--note-done); --rot:0.3deg; }
  .note-fold{
    position:absolute; top:0; right:0; width:18px; height:18px;
    background:linear-gradient(135deg, transparent 50%, rgba(0,0,0,0.06) 50%);
  }
  .note-top{ display:flex; align-items:flex-start; gap:8px; }
  .dot{ width:9px;height:9px;border-radius:50%; margin-top:4px; flex-shrink:0; cursor:pointer; }
  .dot.ok{background:var(--teal);} .dot.soon{background:var(--amber);} .dot.overdue{background:var(--red);} .dot.none{background:#BEB7A6;}
  .note-body{ flex:1; min-width:0; }
  .note-title{ font-size:14px; font-weight:600; line-height:1.35; word-break:break-word; }
  .sticky-note.done .note-title{ text-decoration:line-through; text-decoration-color:var(--ink-soft); }
  .note-meta{ margin-top:5px; font-family:ui-monospace,monospace; font-size:10.5px; color:var(--ink-soft); }
  .note-preview{ margin-top:4px; font-size:12px; color:var(--ink-soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .del-btn{
    background:none;border:none;color:var(--ink-soft); cursor:pointer;
    font-size:14px;padding:0 2px; flex-shrink:0; opacity:0.5;
  }
  .del-btn:hover{ opacity:1; color:var(--red); }

  /* Journal with fade */
  .journal{ display:flex; flex-direction:column; gap:8px; max-height:180px; overflow-y:auto; }
  .entry{
    font-size:13.5px; line-height:1.5; padding:6px 10px; border-radius:4px;
    background:rgba(255,253,247,0.7); transition:opacity 0.8s ease;
  }
  .entry.fading{ opacity:0; }
  .entry .ts{ font-family: ui-monospace, monospace; font-size:10.5px; color:var(--ink-soft); margin-right:8px; }
  .entry.agent{color:var(--teal);}
  .journal-hint{ font-size:11px; color:var(--ink-soft); font-family:ui-monospace,monospace; margin-top:4px; }

  .composer{
    position:fixed; bottom:0; left:0; right:0;
    display:flex; justify-content:center;
    background:linear-gradient(to top, var(--paper) 72%, rgba(246,241,231,0.85) 88%, transparent);
    padding:12px 0 calc(12px + env(safe-area-inset-bottom, 0px)) 0;
    z-index:10;
  }
  .composer-inner{
    width:100%; max-width:900px; padding:0 16px 0 48px;
    display:flex; flex-direction:column; gap:6px;
  }
  .composer-bar{
    display:flex; align-items:flex-end; gap:8px;
    background:var(--card);
    border:1px solid var(--card-border);
    border-radius:22px;
    padding:6px 6px 6px 6px;
    box-shadow: 0 4px 20px rgba(38,34,32,0.08), 0 1px 3px rgba(38,34,32,0.06);
    transition:box-shadow 0.2s ease, border-color 0.2s ease;
  }
  .composer-bar:focus-within{
    border-color:rgba(194,86,75,0.35);
    box-shadow: 0 4px 24px rgba(38,34,32,0.1), 0 0 0 3px rgba(194,86,75,0.12);
  }
  .composer-input-wrap{
    flex:1; min-width:0; display:flex; align-items:flex-end;
    background:var(--paper); border-radius:16px;
    border:1px solid transparent;
    transition:border-color 0.2s ease, background 0.2s ease;
  }
  .composer-bar:focus-within .composer-input-wrap{
    background:#FFFDF9;
    border-color:rgba(194,86,75,0.15);
  }
  #input{
    flex:1; min-width:0; resize:none; border:none; background:transparent;
    padding:11px 4px 11px 14px; font-size:15px; font-family:inherit;
    color:var(--ink); line-height:1.4;
    min-height:44px; max-height:140px;
    outline:none;
  }
  #input::placeholder{ color:#A39E92; opacity:1; }
  button.mic{
    flex-shrink:0; display:flex; align-items:center; justify-content:center;
    width:44px; height:44px; min-width:44px; min-height:44px;
    margin:2px 2px 2px 0; padding:0;
    border:none; border-radius:50%; background:transparent;
    color:var(--ink-soft); cursor:pointer;
    transition:background 0.15s ease, color 0.15s ease, transform 0.12s ease, box-shadow 0.15s ease;
  }
  button.mic:hover:not(:disabled){
    background:rgba(38,34,32,0.06); color:var(--ink);
  }
  button.mic:active:not(:disabled){ transform:scale(0.94); }
  button.mic svg{ width:20px; height:20px; pointer-events:none; }
  button.mic.recording{
    background:var(--margin-red); color:white;
    animation:mic-pulse 1.2s ease-in-out infinite;
  }
  button.mic.recording:hover{ background:#A84A40; color:white; }
  @keyframes mic-pulse{
    0%,100%{ box-shadow:0 0 0 0 rgba(194,86,75,0.55), 0 0 0 3px rgba(194,86,75,0.2); }
    50%{ box-shadow:0 0 0 10px rgba(194,86,75,0), 0 0 0 3px rgba(194,86,75,0.35); }
  }
  button.mic:disabled{ opacity:0.4; cursor:default; }
  .composer-bar.is-recording{
    border-color:rgba(194,86,75,0.5);
    box-shadow:0 4px 24px rgba(194,86,75,0.12), 0 0 0 3px rgba(194,86,75,0.14);
  }
  .recording-badge{
    display:none; align-self:flex-start; margin:0 0 0 12px;
    font-family:ui-monospace,monospace; font-size:10px;
    text-transform:uppercase; letter-spacing:1.2px;
    color:white; background:var(--margin-red);
    padding:3px 10px 3px 8px; border-radius:10px;
    align-items:center; gap:6px;
    animation:badge-pulse 1.2s ease-in-out infinite;
  }
  .recording-badge.visible{ display:inline-flex; }
  .recording-badge .rec-dot{
    width:6px; height:6px; border-radius:50%; background:white;
    animation:rec-dot-blink 1s ease-in-out infinite;
  }
  @keyframes badge-pulse{
    0%,100%{ opacity:1; }
    50%{ opacity:0.82; }
  }
  @keyframes rec-dot-blink{
    0%,100%{ opacity:1; transform:scale(1); }
    50%{ opacity:0.45; transform:scale(0.85); }
  }
  button.send{
    flex-shrink:0; display:flex; align-items:center; justify-content:center; gap:6px;
    min-width:44px; min-height:44px; height:44px;
    padding:0 18px; margin:0;
    border:none; border-radius:16px;
    background:var(--ink); color:var(--paper);
    font-size:14px; font-weight:600; letter-spacing:0.02em;
    cursor:pointer;
    transition:background 0.15s ease, transform 0.12s ease, opacity 0.15s ease, box-shadow 0.15s ease;
    box-shadow:0 2px 6px rgba(38,34,32,0.18);
  }
  button.send:hover:not(:disabled){
    background:#3A3532;
    box-shadow:0 3px 10px rgba(38,34,32,0.22);
  }
  button.send:active:not(:disabled){ transform:scale(0.96); }
  button.send:disabled{ opacity:0.45; cursor:default; box-shadow:none; }
  button.send svg{ width:16px; height:16px; flex-shrink:0; }
  .status{
    font-size:11.5px; color:var(--ink-soft); font-family: ui-monospace, monospace;
    min-height:16px; margin:0 4px; padding-left:4px;
    transition:color 0.2s ease;
  }
  .status.status-recording{ color:var(--margin-red); font-weight:600; }
  .status.status-success{ color:var(--teal); }
  .status.status-error{ color:var(--red); }

  .overlay{ position:fixed; inset:0; background:rgba(38,34,32,0.35); display:none; align-items:center; justify-content:center; z-index:20; padding:16px; }
  .overlay.open{ display:flex; }
  .detail{
    background:var(--card); border:1px solid var(--card-border); border-radius:8px;
    width:100%; max-width:480px; padding:22px; max-height:90vh; overflow-y:auto;
  }
  .detail h2{ margin:0 0 6px 0; font-family: Georgia, serif; font-size:20px; word-break:break-word; }
  .detail .meta{ font-family: ui-monospace, monospace; font-size:12px; color:var(--ink-soft); margin-bottom:14px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
  .detail .cat-badge{
    display:inline-block; padding:2px 10px; border-radius:10px; font-size:11px;
    font-family:-apple-system,sans-serif; font-weight:500;
  }
  .cat-badge.events{background:var(--note-events);}
  .cat-badge.work{background:var(--note-work);}
  .cat-badge.personal{background:var(--note-personal);}
  .cat-badge.school{background:var(--note-school);}
  .cat-badge.inbox{background:var(--note-inbox);}
  .detail textarea.notes{
    width:100%; min-height:100px; font-family:inherit; font-size:14px; padding:10px;
    border:1px solid var(--card-border); border-radius:6px; background:var(--paper); color:var(--ink);
  }
  .detail-actions{ display:flex; justify-content:space-between; gap:8px; margin-top:14px; flex-wrap:wrap; }
  .detail-actions .left{ display:flex; gap:8px; }
  .detail-actions .right{ display:flex; gap:8px; }
  .detail-actions button{ border:none; border-radius:6px; padding:8px 14px; font-size:13px; cursor:pointer; }
  .btn-save{ background:var(--ink); color:var(--paper); }
  .btn-close{ background:transparent; color:var(--ink-soft); }
  .btn-done{ background:var(--teal); color:white; }
  .btn-delete{ background:transparent; color:var(--red); border:1px solid var(--card-border) !important; }

  /* auth screen */
  .auth-wrap{ min-height:100vh; display:flex; align-items:center; justify-content:center; width:100%; }
  .auth-card{ background:var(--card); border:1px solid var(--card-border); border-radius:8px; padding:32px; width:90%; max-width:360px; }
  .auth-card h1{ font-family: Georgia, serif; font-size:28px; margin:0 0 4px 0; }
  .auth-card p.tag{ background:none; padding:0; color:var(--ink-soft); font-size:13px; margin:0 0 20px 0; }
  .auth-card input{ width:100%; padding:10px 12px; margin-bottom:10px; border:1px solid var(--card-border); border-radius:6px; background:var(--paper); font-size:14px; color:var(--ink); }
  .auth-card button.primary{ width:100%; padding:10px; border:none; border-radius:6px; background:var(--ink); color:var(--paper); font-size:14px; cursor:pointer; margin-top:4px; }
  .auth-toggle{ text-align:center; margin-top:14px; font-size:13px; color:var(--ink-soft); }
  .auth-toggle a{ color:var(--margin-red); cursor:pointer; text-decoration:underline; }
  .auth-error{ color:var(--red); font-size:12.5px; min-height:16px; margin-bottom:4px; }

  /* reminders */
  .reminder-banner{
    display:none; margin:12px 0 0 0; padding:10px 14px; border-radius:6px;
    font-size:13px; line-height:1.45; border:1px solid var(--card-border); background:var(--card);
  }
  .reminder-banner.show{ display:block; }
  .reminder-banner.overdue{ border-color:#E8B4AB; background:#FFF6F3; }
  .reminder-banner.soon{ border-color:#E8D4A8; background:#FFFBF0; }
  .reminder-banner strong{ font-weight:600; }
  .reminder-banner button{
    margin-left:10px; background:none; border:none; color:var(--ink-soft);
    font-size:12px; cursor:pointer; text-decoration:underline;
  }
  .reminder-list{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:4px; }
  .reminder-item{
    display:flex; align-items:center; gap:8px; padding:6px 10px;
    background:var(--card); border:1px solid var(--card-border); border-radius:4px;
    font-size:12px; cursor:pointer;
  }
  .reminder-item:hover{ border-color:var(--margin-red); }
  .reminder-item .ri-dot{ width:7px;height:7px;border-radius:50%; flex-shrink:0; }
  .reminder-item .ri-title{ font-weight:500; }
  .reminder-item .ri-when{ font-family:ui-monospace,monospace; font-size:10px; color:var(--ink-soft); }
  .toast{
    position:fixed; top:20px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:var(--paper); padding:10px 16px; border-radius:6px;
    font-size:13px; z-index:30; opacity:0; pointer-events:none; transition:opacity 0.25s;
    max-width:90%; text-align:center;
  }
  .toast.show{ opacity:1; pointer-events:auto; }

  @media (max-width:1024px){
    .composer-inner{ padding:0 16px 0 40px; }
  }
  @media (max-width:768px){
    .page{ padding:22px 14px calc(130px + env(safe-area-inset-bottom, 0px)) 38px; }
    .margin-rule{ left:24px; }
    .composer-inner{ padding:0 14px 0 38px; }
    header h1{ font-size:26px; }
    .board-column{ flex:0 0 74vw; }
  }
  @media (max-width:600px){
    .page{ padding:20px 12px calc(128px + env(safe-area-inset-bottom, 0px)) 36px; }
    .margin-rule{ left:22px; }
    .composer-inner{ padding:0 12px 0 32px; }
    header h1{ font-size:24px; }
    .board-column{ flex:0 0 72vw; }
    #input{ font-size:16px; padding-left:12px; }
    button.send{ padding:0 14px; border-radius:14px; }
  }
  @media (max-width:380px){
    .composer-inner{ padding:0 10px 0 28px; }
    .composer-bar{ border-radius:20px; padding:5px; }
    button.send .send-label{ display:none; }
    button.send{ padding:0; width:44px; border-radius:50%; }
  }
</style>
</head>
<body>

<div class="auth-wrap" id="authWrap">
  <div class="auth-card">
    <h1>Logbook</h1>
    <p class="tag" id="authSubtitle">Sign in to your log.</p>
    <div class="auth-error" id="authError"></div>
    <input type="email" id="authEmail" placeholder="Email" autocomplete="email">
    <input type="password" id="authPassword" placeholder="Password" autocomplete="current-password">
    <button class="primary" id="authSubmit">Sign in</button>
    <div class="auth-toggle" id="authToggle">No account yet? <a id="authToggleLink">Create one</a></div>
  </div>
</div>

<div class="page" id="page">
  <div class="margin-rule"></div>
  <header>
    <div>
      <h1>Logbook</h1>
      <p>Paste anything, talk, or type — sticky notes keep track.</p>
    </div>
    <div class="header-actions">
      <button class="mcp-token-btn" id="mcpTokenBtn" title="Generate token for Cursor MCP">MCP token</button>
      <button class="signout" id="signoutBtn">Sign out</button>
    </div>
  </header>
  <div class="mcp-token-panel" id="mcpTokenPanel">
    <strong>MCP API token</strong> — use in Cursor remote MCP config with <code>Authorization: Bearer …</code>
    <code id="mcpTokenValue"></code>
    <button class="mcp-token-btn" id="mcpTokenCopyBtn">Copy token</button>
  </div>

  <div class="reminder-banner" id="reminderBanner"></div>

  <div class="section-label" id="remindersLabel" style="display:none;">Reminders</div>
  <div class="reminder-list" id="reminders"></div>

  <div class="section-label">Board</div>
  <div class="board-wrap">
    <div class="board-scroll" id="board"></div>
  </div>

  <div class="section-label" id="doneLabel" style="display:none;">Completed</div>
  <div class="board-wrap" id="doneWrap" style="display:none;">
    <div class="board-scroll" id="doneBoard"></div>
  </div>

  <div class="section-label">Log</div>
  <div class="journal" id="journal"></div>
  <div class="journal-hint" id="journalHint"></div>
</div>

<div class="toast" id="toast"></div>

<div class="overlay" id="overlay">
  <div class="detail">
    <h2 id="detailTitle"></h2>
    <div class="meta" id="detailMeta"></div>
    <textarea class="notes" id="detailNotes" placeholder="Notes..."></textarea>
    <div class="detail-actions">
      <div class="left">
        <button class="btn-delete" id="detailDeleteBtn">Delete</button>
      </div>
      <div class="right">
        <button class="btn-close" onclick="closeDetail()">Close</button>
        <button class="btn-done" id="detailDoneBtn">Mark done</button>
        <button class="btn-save" onclick="saveDetailNotes()">Save notes</button>
      </div>
    </div>
  </div>
</div>

<div class="composer" id="composer" style="display:none;">
  <div class="composer-inner">
    <div class="composer-bar">
      <div class="composer-input-wrap">
        <textarea id="input" rows="1" placeholder="Paste, type, or talk…"></textarea>
        <button class="mic" id="micBtn" type="button" title="Tap to speak" aria-label="Tap to speak" aria-pressed="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" x2="12" y1="19" y2="22"/>
          </svg>
        </button>
      </div>
      <button class="send" id="sendBtn" type="button" aria-label="Add entry">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/>
        </svg>
        <span class="send-label">Add</span>
      </button>
    </div>
    <div class="recording-badge" id="recordingBadge" aria-hidden="true"><span class="rec-dot"></span>Recording</div>
    <div class="status" id="status"></div>
  </div>
</div>

<script>
let tasks = [];
let journal = [];
let visibleEntries = [];
let activeTaskId = null;
let isSignup = false;
let currentEmail = null;
let journalFadeTimers = new Map();

const API = { credentials: 'same-origin' };
const CATEGORY_ORDER = ['Events', 'Work', 'Personal', 'School', 'Inbox'];
const DEFAULT_LOG_FADE_SEC = 45;

function logFadeSec(){
  const v = parseInt(localStorage.getItem('logbook_log_fade_sec') || '', 10);
  return (v >= 15 && v <= 120) ? v : DEFAULT_LOG_FADE_SEC;
}

function journalKey(){ return currentEmail ? `logbook_journal_${currentEmail}` : 'logbook_journal'; }
function loadJournal(){
  journal = JSON.parse(localStorage.getItem(journalKey()) || '[]');
}
function saveJournal(){
  const trimmed = journal.slice(-100);
  localStorage.setItem(journalKey(), JSON.stringify(trimmed));
  journal = trimmed;
}

function catClass(cat){
  const c = (cat || 'Inbox').toLowerCase();
  return 'cat-' + (['events','work','personal','school','inbox'].includes(c) ? c : 'inbox');
}

/* ---------- Auth ---------- */

async function checkSession(){
  try{
    const res = await fetch('/api/me', API);
    if(res.ok){
      const data = await res.json();
      currentEmail = data.email;
      loadJournal();
      showApp();
      return;
    }
  }catch(e){}
  showAuth();
}

function showAuth(){
  currentEmail = null;
  tasks = [];
  clearJournalTimers();
  visibleEntries = [];
  stopReminders();
  document.getElementById('authWrap').style.display = 'flex';
  document.getElementById('page').style.display = 'none';
  document.getElementById('composer').style.display = 'none';
}

async function showApp(){
  document.getElementById('authWrap').style.display = 'none';
  document.getElementById('page').style.display = 'block';
  document.getElementById('composer').style.display = 'flex';
  updateJournalHint();
  await loadTasks();
  renderJournal();
  startReminders();
}

function updateJournalHint(){
  document.getElementById('journalHint').textContent =
    `Entries fade after ${logFadeSec()}s · set logbook_log_fade_sec in console (15–120)`;
}

document.getElementById('authToggleLink').addEventListener('click', () => {
  isSignup = !isSignup;
  document.getElementById('authSubtitle').textContent = isSignup ? 'Create your log.' : 'Sign in to your log.';
  document.getElementById('authSubmit').textContent = isSignup ? 'Create account' : 'Sign in';
  document.getElementById('authToggle').innerHTML = isSignup
    ? 'Already have an account? <a id="authToggleLink2">Sign in</a>'
    : 'No account yet? <a id="authToggleLink2">Create one</a>';
  document.getElementById('authToggleLink2').addEventListener('click', () => document.getElementById('authToggleLink').click());
  document.getElementById('authError').textContent = '';
});

document.getElementById('authSubmit').addEventListener('click', async () => {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const errEl = document.getElementById('authError');
  errEl.textContent = '';

  if(!email || !password){ errEl.textContent = 'Enter an email and password.'; return; }

  try{
    const res = await fetch(isSignup ? '/api/signup' : '/api/login', {
      ...API,
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if(!res.ok){ errEl.textContent = data.error || 'Something went wrong.'; return; }
    currentEmail = data.email;
    loadJournal();
    showApp();
  }catch(e){
    errEl.textContent = 'Could not reach the server.';
  }
});

document.getElementById('signoutBtn').addEventListener('click', async () => {
  await fetch('/api/logout', { ...API, method: 'POST' });
  tasks = [];
  document.getElementById('mcpTokenPanel').style.display = 'none';
  showAuth();
});

document.getElementById('mcpTokenBtn').addEventListener('click', async () => {
  const panel = document.getElementById('mcpTokenPanel');
  const valueEl = document.getElementById('mcpTokenValue');
  try {
    const res = await fetch('/api/mcp/token', { ...API, method: 'POST' });
    const data = await res.json();
    if (!res.ok) {
      showToast(data.error || 'Could not get MCP token');
      return;
    }
    valueEl.textContent = data.token;
    panel.style.display = 'block';
    showToast('MCP token ready — copy for Cursor config');
  } catch (e) {
    showToast('Could not reach the server');
  }
});

document.getElementById('mcpTokenCopyBtn').addEventListener('click', async () => {
  const token = document.getElementById('mcpTokenValue').textContent;
  if (!token) return;
  try {
    await navigator.clipboard.writeText(token);
    showToast('Token copied');
  } catch (e) {
    showToast('Copy failed — select token manually');
  }
});

/* ---------- Tasks ---------- */

function uid(){ return Math.random().toString(36).slice(2,10); }

function userTimezone(){
  return Intl.DateTimeFormat().resolvedOptions().timeZone;
}

function localTodayIso(){
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, "0");
  const d = String(now.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function parseLocalDate(dateStr){
  const [y, m, d] = dateStr.split("-").map(Number);
  return new Date(y, m - 1, d);
}

function daysUntil(dateStr){
  if(!dateStr) return null;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const deadline = parseLocalDate(dateStr);
  return Math.round((deadline - today) / (1000 * 60 * 60 * 24));
}
function urgencyClass(dateStr, done){
  if(done || !dateStr) return "none";
  const d = daysUntil(dateStr);
  if(d < 0) return "overdue";
  if(d <= 2) return "soon";
  return "ok";
}
function fmtDate(dateStr){
  if(!dateStr) return "no date";
  const d = daysUntil(dateStr);
  const nice = parseLocalDate(dateStr).toLocaleDateString(undefined, {month:"short", day:"numeric"});
  if(d === 0) return nice + " · today";
  if(d === 1) return nice + " · tomorrow";
  if(d < 0) return nice + " · " + Math.abs(d) + "d overdue";
  return nice + " · in " + d + "d";
}

/* ---------- Reminders ---------- */

function reminderTasks(){
  return tasks.filter(t => !t.done && t.deadline).map(t => ({ ...t, days: daysUntil(t.deadline) }))
    .filter(t => t.days <= 2)
    .sort((a,b) => a.days - b.days);
}

function notifiedKey(){ return currentEmail ? `logbook_notified_${currentEmail}` : 'logbook_notified'; }
function loadNotified(){
  try{ return JSON.parse(localStorage.getItem(notifiedKey()) || '{}'); }catch(e){ return {}; }
}
function saveNotified(map){ localStorage.setItem(notifiedKey(), JSON.stringify(map)); }

function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => el.classList.remove('show'), 4000);
}

function renderReminderBanner(){
  const el = document.getElementById('reminderBanner');
  const list = reminderTasks();
  if(list.length === 0){ el.className = 'reminder-banner'; el.innerHTML = ''; return; }

  const overdue = list.filter(t => t.days < 0).length;
  const today = list.filter(t => t.days === 0).length;
  const tomorrow = list.filter(t => t.days === 1).length;
  const parts = [];
  if(overdue) parts.push(`<strong>${overdue} overdue</strong>`);
  if(today) parts.push(`<strong>${today} due today</strong>`);
  if(tomorrow) parts.push(`${tomorrow} due tomorrow`);

  const cls = overdue ? 'overdue' : 'soon';
  const notifyBtn = ('Notification' in window && Notification.permission === 'default')
    ? `<button type="button" id="enableNotifyBtn">Enable alerts</button>` : '';

  el.className = `reminder-banner show ${cls}`;
  el.innerHTML = `⏰ ${parts.join(' · ')}${notifyBtn}`;
  const btn = document.getElementById('enableNotifyBtn');
  if(btn) btn.onclick = () => Notification.requestPermission().then(() => renderReminderBanner());
}

function renderReminders(){
  const list = reminderTasks();
  const label = document.getElementById('remindersLabel');
  const el = document.getElementById('reminders');
  if(list.length === 0){
    label.style.display = 'none';
    el.innerHTML = '';
    return;
  }
  label.style.display = 'block';
  el.innerHTML = list.map(t => `
    <div class="reminder-item" onclick="openDetail('${t.id}')">
      <div class="ri-dot dot ${urgencyClass(t.deadline, false)}"></div>
      <span class="ri-title">${escapeHtml(t.title)}</span>
      <span class="ri-when">${fmtDate(t.deadline)}</span>
    </div>
  `).join('');
}

function checkReminderAlerts(){
  renderReminderBanner();
  renderReminders();

  const list = reminderTasks();
  const notified = loadNotified();
  const todayStr = localTodayIso();

  for(const t of list){
    const key = `${t.id}:${t.deadline}`;
    if(notified[key] === todayStr) continue;

    let msg = null;
    if(t.days < 0) msg = `Overdue: ${t.title}`;
    else if(t.days === 0) msg = `Due today: ${t.title}`;
    else if(t.days === 1) msg = `Due tomorrow: ${t.title}`;

    if(!msg) continue;

    if(document.visibilityState === 'visible') showToast(msg);

    if('Notification' in window && Notification.permission === 'granted'){
      new Notification('Logbook', { body: msg, tag: key });
    }

    notified[key] = todayStr;
  }
  saveNotified(notified);
}

let reminderInterval = null;
function startReminders(){
  if(reminderInterval) clearInterval(reminderInterval);
  checkReminderAlerts();
  reminderInterval = setInterval(checkReminderAlerts, 5 * 60 * 1000);
}
function stopReminders(){
  if(reminderInterval){ clearInterval(reminderInterval); reminderInterval = null; }
}

function sortTasks(list){
  return [...list].sort((a,b)=>{
    const da = a.deadline ? daysUntil(a.deadline) : Infinity;
    const db = b.deadline ? daysUntil(b.deadline) : Infinity;
    return da - db;
  });
}
function escapeHtml(s){ const d = document.createElement('div'); d.innerText = s || ''; return d.innerHTML; }

function taskCategory(t){ return t.category || 'Inbox'; }

function groupByCategory(list){
  const groups = {};
  for(const t of list){
    const cat = taskCategory(t);
    if(!groups[cat]) groups[cat] = [];
    groups[cat].push(t);
  }
  const ordered = [];
  for(const cat of CATEGORY_ORDER){
    if(groups[cat]?.length) ordered.push([cat, sortTasks(groups[cat])]);
    delete groups[cat];
  }
  for(const cat of Object.keys(groups).sort()){
    ordered.push([cat, sortTasks(groups[cat])]);
  }
  return ordered;
}

function renderStickyNote(t){
  const cat = taskCategory(t);
  return `
    <div class="sticky-note ${t.done ? 'done' : ''} ${catClass(cat)}" data-id="${t.id}" onclick="openDetail('${t.id}')">
      <div class="note-fold"></div>
      <div class="note-top">
        <div class="dot ${urgencyClass(t.deadline, t.done)}" onclick="toggleDone('${t.id}', event)"></div>
        <div class="note-body">
          <div class="note-title">${escapeHtml(t.title)}</div>
          <div class="note-meta">${fmtDate(t.deadline)}</div>
          ${t.notes ? `<div class="note-preview">${escapeHtml(t.notes)}</div>` : ''}
        </div>
        <button class="del-btn" onclick="deleteTask('${t.id}', event)" title="Delete">✕</button>
      </div>
    </div>
  `;
}

function renderBoardColumns(list, el, showEmpty){
  const groups = groupByCategory(list);
  if(groups.length === 0 && !showEmpty){
    el.innerHTML = '';
    return;
  }

  if(showEmpty && groups.length === 0){
    el.innerHTML = '<div class="empty" style="padding:12px;">Nothing tracked yet. Paste something below, talk, or type a task.</div>';
    return;
  }

  const columns = showEmpty
    ? CATEGORY_ORDER.map(cat => [cat, groups.find(([c]) => c === cat)?.[1] || []])
    : groups;

  el.innerHTML = columns.map(([cat, items]) => `
    <div class="board-column">
      <div class="column-header">${escapeHtml(cat)} <span class="column-count">${items.length}</span></div>
      <div class="column-notes">
        ${items.length === 0
          ? '<div class="column-empty">—</div>'
          : items.map(renderStickyNote).join('')}
      </div>
    </div>
  `).join('');
}

function renderTasks(){
  const open = tasks.filter(t => !t.done);
  const done = tasks.filter(t => t.done);
  const board = document.getElementById('board');
  const doneBoard = document.getElementById('doneBoard');
  const doneLabel = document.getElementById('doneLabel');
  const doneWrap = document.getElementById('doneWrap');

  renderBoardColumns(open, board, true);
  checkReminderAlerts();

  if(done.length > 0){
    doneLabel.style.display = 'block';
    doneWrap.style.display = 'block';
    renderBoardColumns(done, doneBoard, false);
  } else {
    doneLabel.style.display = 'none';
    doneWrap.style.display = 'none';
    doneBoard.innerHTML = '';
  }
}

/* ---------- Journal with fade ---------- */

function clearJournalTimers(){
  for(const t of journalFadeTimers.values()){
    clearTimeout(t.fadeStartTimer);
    clearTimeout(t.removeTimer);
  }
  journalFadeTimers.clear();
}

function addVisibleEntry(entry){
  const id = entry.id || (entry.id = uid());
  entry.addedAt = entry.addedAt || Date.now();
  visibleEntries.push(entry);

  const fadeMs = logFadeSec() * 1000;
  const fadeStartMs = Math.max(fadeMs - 5000, fadeMs * 0.8);

  const fadeStartTimer = setTimeout(() => {
    const el = document.querySelector(`[data-entry-id="${id}"]`);
    if(el) el.classList.add('fading');
  }, fadeStartMs);

  const removeTimer = setTimeout(() => {
    visibleEntries = visibleEntries.filter(e => e.id !== id);
    renderJournal();
    journalFadeTimers.delete(id);
  }, fadeMs);

  journalFadeTimers.set(id, { fadeStartTimer, removeTimer });
  renderJournal();
}

function renderJournal(){
  const el = document.getElementById('journal');
  if(visibleEntries.length === 0){
    el.innerHTML = '<div class="empty">Your log entries appear here briefly, then fade away.</div>';
    return;
  }
  el.innerHTML = visibleEntries.map(e => `
    <div class="entry ${e.role}" data-entry-id="${e.id}">
      <span class="ts">${e.ts}</span>${escapeHtml(e.text)}
    </div>
  `).join('');
  el.scrollTop = el.scrollHeight;
}

function pushJournal(role, text){
  const entry = { role, text, ts: nowTs(), id: uid(), addedAt: Date.now() };
  journal.push(entry);
  saveJournal();
  addVisibleEntry({ ...entry });
}

/* ---------- API ---------- */

async function loadTasks(){
  try{
    const res = await fetch('/api/tasks', API);
    if(res.status === 401){ showAuth(); return; }
    if(res.ok){
      const data = await res.json();
      tasks = (data.tasks || []).map(t => ({ ...t, category: t.category || 'Inbox' }));
    }
  }catch(e){}
  renderTasks();
}

async function persistTasks(){
  saveJournal();
  try{
    await fetch('/api/tasks', {
      ...API,
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ tasks })
    });
  }catch(e){}
}

function toggleDone(id, evt){ evt.stopPropagation(); tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t); persistTasks(); renderTasks(); if(activeTaskId === id) updateDetailButtons(); }
function deleteTask(id, evt){ evt.stopPropagation(); tasks = tasks.filter(t => t.id !== id); persistTasks(); renderTasks(); if(activeTaskId === id) closeDetail(); }

function openDetail(id){
  const t = tasks.find(x => x.id === id);
  if(!t) return;
  activeTaskId = id;
  document.getElementById('detailTitle').textContent = t.title;
  const cat = taskCategory(t);
  document.getElementById('detailMeta').innerHTML =
    `<span>${fmtDate(t.deadline)}</span>` +
    `<span class="cat-badge ${cat.toLowerCase()}">${escapeHtml(cat)}</span>`;
  document.getElementById('detailNotes').value = t.notes || '';
  updateDetailButtons();
  document.getElementById('overlay').classList.add('open');
}

function updateDetailButtons(){
  const t = tasks.find(x => x.id === activeTaskId);
  if(!t) return;
  document.getElementById('detailDoneBtn').textContent = t.done ? 'Mark open' : 'Mark done';
}

function closeDetail(){ document.getElementById('overlay').classList.remove('open'); activeTaskId = null; }

function saveDetailNotes(){
  if(!activeTaskId) return;
  const val = document.getElementById('detailNotes').value;
  tasks = tasks.map(t => t.id === activeTaskId ? {...t, notes: val} : t);
  persistTasks(); renderTasks(); closeDetail();
}

document.getElementById('detailDoneBtn').addEventListener('click', () => {
  if(!activeTaskId) return;
  tasks = tasks.map(t => t.id === activeTaskId ? {...t, done: !t.done} : t);
  persistTasks(); renderTasks(); closeDetail();
});

document.getElementById('detailDeleteBtn').addEventListener('click', () => {
  if(!activeTaskId) return;
  tasks = tasks.filter(t => t.id !== activeTaskId);
  persistTasks(); renderTasks(); closeDetail();
});

function nowTs(){ return new Date().toLocaleTimeString(undefined, {hour:'2-digit', minute:'2-digit'}); }

async function handleSend(){
  const input = document.getElementById('input');
  const text = input.value.trim();
  if(!text) return;
  const btn = document.getElementById('sendBtn');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.textContent = 'thinking…';

  pushJournal('user', text);
  input.value = '';
  autoResizeInput();

  try{
    const res = await fetch('/api/chat', {
      ...API,
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        message: text,
        timezone: userTimezone(),
        today: localTodayIso(),
      })
    });
    const parsed = await res.json();
    if(res.status === 401){ showAuth(); return; }
    tasks = Array.isArray(parsed.tasks) ? parsed.tasks.map(t => ({ ...t, category: t.category || 'Inbox' })) : tasks;
    pushJournal('agent', parsed.reply || 'Done.');
  }catch(e){
    pushJournal('agent', "Couldn't reach the server — try again.");
  }

  renderTasks();
  status.textContent = '';
  btn.disabled = false;
}

function autoResizeInput(){
  const el = document.getElementById('input');
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

document.getElementById('sendBtn').addEventListener('click', handleSend);
document.getElementById('input').addEventListener('input', autoResizeInput);
document.getElementById('input').addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); handleSend(); }
});

/* Voice input */
const micBtn = document.getElementById('micBtn');
const recordingBadge = document.getElementById('recordingBadge');
const composerBar = document.querySelector('.composer-bar');
const MIC_ICON_IDLE = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>`;
const MIC_ICON_RECORDING = `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="7" y="7" width="10" height="10" rx="1.5"/></svg>`;
let micIsRecording = false;
let micManualStop = false;
let micBaseText = '';
let micFinalTranscript = '';
let micInterimTranscript = '';
let micStatusTimer = null;

function setComposerStatus(msg, type){
  const status = document.getElementById('status');
  status.textContent = msg;
  status.className = 'status' + (type ? ' status-' + type : '');
}

function showMicStatus(msg, type, duration){
  clearTimeout(micStatusTimer);
  setComposerStatus(msg, type);
  if(duration){
    micStatusTimer = setTimeout(() => {
      micStatusTimer = null;
      if(!micIsRecording) setComposerStatus('Tap mic to speak', '');
    }, duration);
  }
}

function setMicRecording(active){
  micIsRecording = active;
  micBtn.classList.toggle('recording', active);
  micBtn.setAttribute('aria-pressed', String(active));
  micBtn.setAttribute('aria-label', active ? 'Tap to stop' : 'Tap to speak');
  micBtn.title = active ? 'Tap to stop' : 'Tap to speak';
  micBtn.innerHTML = active ? MIC_ICON_RECORDING : MIC_ICON_IDLE;
  if(recordingBadge) recordingBadge.classList.toggle('visible', active);
  if(composerBar) composerBar.classList.toggle('is-recording', active);
  if(active){
    clearTimeout(micStatusTimer);
    setComposerStatus('Listening…', 'recording');
  }
}

function syncMicToInput(){
  const input = document.getElementById('input');
  let value = micBaseText;
  const spoken = micFinalTranscript + micInterimTranscript;
  if(spoken){
    if(value && !value.endsWith(' ')) value += ' ';
    value += spoken;
  }
  input.value = value;
  autoResizeInput();
}

function finishMicRecording(){
  micInterimTranscript = '';
  syncMicToInput();
  setMicRecording(false);
  micManualStop = false;
  if(micFinalTranscript.trim() || micBaseText.trim()){
    showMicStatus('Got it — review or send', 'success', 2500);
  } else {
    showMicStatus('Tap mic to speak', '');
  }
}

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SpeechRecognition){
  const recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.onresult = (e) => {
    micInterimTranscript = '';
    for(let i = e.resultIndex; i < e.results.length; i++){
      const transcript = e.results[i][0].transcript;
      if(e.results[i].isFinal){
        micFinalTranscript += transcript;
      } else {
        micInterimTranscript = transcript;
      }
    }
    syncMicToInput();
  };
  recognition.onerror = (e) => {
    if(e.error === 'aborted') return;
    if(e.error === 'no-speech' && micIsRecording && !micManualStop) return;
    setMicRecording(false);
    micManualStop = false;
    micInterimTranscript = '';
    syncMicToInput();
    let msg = 'Microphone error — try again.';
    if(e.error === 'not-allowed') msg = 'Microphone access denied. Allow mic in browser settings.';
    else if(e.error === 'no-speech') msg = 'No speech detected — tap mic and try again.';
    else if(e.error === 'audio-capture') msg = 'No microphone found. Check your device.';
    showMicStatus(msg, 'error', 5000);
  };
  recognition.onend = () => {
    if(micManualStop){
      finishMicRecording();
      return;
    }
    if(!micIsRecording) return;
    try{
      recognition.start();
    }catch(err){
      finishMicRecording();
      showMicStatus('Could not continue listening.', 'error', 5000);
    }
  };
  micBtn.addEventListener('click', () => {
    if(micIsRecording){
      micManualStop = true;
      recognition.stop();
      return;
    }
    micManualStop = false;
    micBaseText = document.getElementById('input').value;
    micFinalTranscript = '';
    micInterimTranscript = '';
    try{
      setMicRecording(true);
      recognition.start();
    }catch(err){
      setMicRecording(false);
      showMicStatus('Could not start microphone.', 'error', 5000);
    }
  });
  setComposerStatus('Tap mic to speak', '');
} else {
  micBtn.disabled = true;
  micBtn.title = 'Voice input not supported in this browser';
  micBtn.setAttribute('aria-label', 'Voice input not supported');
  setComposerStatus('Voice input not supported in this browser', 'error');
}

checkSession();
</script>
